name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - '.claude/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install ruff
        run: uv pip install --system ruff
      - name: Run ruff check
        run: ruff check backend/src/ backend/tests/
      - name: Run ruff format check
        run: ruff format --check backend/src/ backend/tests/

  backend-typecheck:
    name: Backend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: cd backend && uv pip install --system -e .
      - name: Install mypy and stubs
        run: cd backend && uv pip install --system mypy boto3-stubs[s3,bedrock-runtime]
      - name: Run mypy
        run: cd backend && mypy src/

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: cd backend && uv pip install --system -e .
      - name: Install test dependencies
        run: cd backend && uv pip install --system pytest pytest-cov httpx anyio
      - name: Run tests with coverage
        run: cd backend && pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-fail-under=75 -m "not integration"

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: cd frontend && pnpm install
      - name: Run eslint
        run: cd frontend && pnpm run lint
      - name: Run prettier check
        run: cd frontend && pnpm run format:check

  frontend-check:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: cd frontend && pnpm install
      - name: Run svelte-check
        run: cd frontend && pnpm run check

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install dependencies
        run: cd frontend && pnpm install
      - name: Run tests
        run: cd frontend && pnpm run test

  commit-lint:
    name: Commit Lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check conventional commits
        run: |
          COMMITS=$(git log --format='%s' origin/${{ github.base_ref }}..HEAD)
          PATTERN='^(feat|fix|docs|test|chore|ci|refactor|style|build|perf|revert)(\(.+\))?: .+'
          FAILED=0
          while IFS= read -r commit; do
            if [ -n "$commit" ] && ! echo "$commit" | grep -qE "$PATTERN"; then
              echo "Non-conventional commit: $commit"
              FAILED=1
            fi
          done <<< "$COMMITS"
          if [ "$FAILED" -eq 1 ]; then
            echo "Some commits do not follow conventional commits format"
            exit 1
          fi
          echo "All commits follow conventional commits format"

  all-checks:
    name: All Checks
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-typecheck, backend-test, frontend-lint, frontend-check, frontend-test, commit-lint]
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend-lint.result }}" = "failure" ] || \
             [ "${{ needs.backend-typecheck.result }}" = "failure" ] || \
             [ "${{ needs.backend-test.result }}" = "failure" ] || \
             [ "${{ needs.frontend-lint.result }}" = "failure" ] || \
             [ "${{ needs.frontend-check.result }}" = "failure" ] || \
             [ "${{ needs.frontend-test.result }}" = "failure" ] || \
             [ "${{ needs.commit-lint.result }}" = "failure" ]; then
            echo "One or more checks failed"
            exit 1
          fi
          echo "All checks passed"
